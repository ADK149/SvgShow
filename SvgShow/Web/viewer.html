<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SVG Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: white; }
        #viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
            position: relative;
            background: white;
        }
        #viewport.dragging { cursor: grabbing; }
        #root-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .svg-layer-g {
            transform-origin: 0 0;
        }
        #status-text {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: #888;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="viewport">
        <svg id="root-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
            <defs>
                <style>
                    .svg-layer-g { transform-origin: 0 0; }
                </style>
            </defs>
            <g id="layers-group"></g>
        </svg>
        <div id="status-text">就绪</div>
    </div>

    <script>
        const state = {
            viewBox: { x: 0, y: 0, w: 800, h: 600 },
            baseViewBox: { x: 0, y: 0, w: 800, h: 600 },
            isDragging: false,
            lastMousePos: { x: 0, y: 0 },
            svgLayers: {},
            layerOrder: [],
            selectedElement: null,
            svgBounds: { x: 0, y: 0, w: 800, h: 600 },
            allLayersBounds: null,
            styleConfig: {
                strokeWidth: 0.5,
                fontScale: 1,
                enableOverride: true
            }
        };

        const viewport = document.getElementById('viewport');
        const rootSvg = document.getElementById('root-svg');
        const layersGroup = document.getElementById('layers-group');
        const measureLine = document.getElementById('measure-line');
        const measureLabel = document.getElementById('measure-label');
        const statusText = document.getElementById('status-text');

        function getCurrentScale() {
            const rect = viewport.getBoundingClientRect();
            const scaleX = rect.width / state.viewBox.w;
            const scaleY = rect.height / state.viewBox.h;
            return Math.min(scaleX, scaleY);
        }

        function updateViewBox() {
            rootSvg.setAttribute('viewBox', 
                `${state.viewBox.x} ${state.viewBox.y} ${state.viewBox.w} ${state.viewBox.h}`);
            
            const scale = getCurrentScale();
            sendToCSharp({ type: 'scaleChanged', scale: scale / getBaseScale() });
            
            updateFontSizeWithZoom();
        }
        
        function updateFontSizeWithZoom() {
            if (!state.styleConfig.enableOverride) return;
            
            const zoomFactor = getCurrentScale() / getBaseScale();
            const fontScale = state.styleConfig.fontScale;
            
            state.layerOrder.forEach(id => {
                const layer = state.svgLayers[id];
                if (layer && layer.originalStyles) {
                    layer.originalStyles.forEach(info => {
                        if ('fontSize' in info) {
                            const el = info.element;
                            const originalFontSize = parseFloat(info.fontSize) || 12;
                            let adjustedFontSize = originalFontSize * fontScale / zoomFactor;
                            adjustedFontSize = Math.max(5, Math.min(1000, adjustedFontSize));
                            el.setAttribute('font-size', adjustedFontSize);
                        }
                    });
                }
            });
        }

        function getBaseScale() {
            const rect = viewport.getBoundingClientRect();
            const scaleX = rect.width / state.baseViewBox.w;
            const scaleY = rect.height / state.baseViewBox.h;
            return Math.min(scaleX, scaleY);
        }

        function screenToSvg(screenX, screenY) {
            const pt = rootSvg.createSVGPoint();
            pt.x = screenX;
            pt.y = screenY;
            const ctm = rootSvg.getScreenCTM();
            if (ctm) {
                const svgPt = pt.matrixTransform(ctm.inverse());
                return { x: svgPt.x, y: svgPt.y };
            }
            return { x: 0, y: 0 };
        }

        function svgToScreen(svgX, svgY) {
            const pt = rootSvg.createSVGPoint();
            pt.x = svgX;
            pt.y = svgY;
            const ctm = rootSvg.getScreenCTM();
            if (ctm) {
                const screenPt = pt.matrixTransform(ctm);
                return { x: screenPt.x, y: screenPt.y };
            }
            return { x: 0, y: 0 };
        }

        viewport.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            
            state.isDragging = true;
            state.lastMousePos = { x: e.clientX, y: e.clientY };
            viewport.classList.add('dragging');
            
            const target = e.target;
            if (target && target.tagName && 
                target !== rootSvg && 
                target !== layersGroup &&
                target.tagName !== 'svg') {
                handleSelection(target);
            } else {
                clearSelection();
            }
        });

        viewport.addEventListener('mousemove', (e) => {
            const pos = screenToSvg(e.clientX, e.clientY);
            const scale = getCurrentScale() / getBaseScale() * 100;
            updateStatus(`坐标: (${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}) | 缩放: ${scale.toFixed(0)}%`);
            sendToCSharp({ type: 'mouseMove', x: pos.x, y: pos.y, screenX: e.clientX, screenY: e.clientY });
            
            if (state.isDragging) {
                const dx = (e.clientX - state.lastMousePos.x) / getCurrentScale();
                const dy = (e.clientY - state.lastMousePos.y) / getCurrentScale();
                state.viewBox.x -= dx;
                state.viewBox.y -= dy;
                state.lastMousePos = { x: e.clientX, y: e.clientY };
                updateViewBox();
            }
        });

        viewport.addEventListener('mouseup', (e) => {
            if (e.button !== 0) return;
            state.isDragging = false;
            viewport.classList.remove('dragging');
        });

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9;
            
            const mousePos = screenToSvg(e.clientX, e.clientY);
            
            const newW = state.viewBox.w * zoomFactor;
            const newH = state.viewBox.h * zoomFactor;
            
            const minSize = 10;
            const maxSize = state.svgBounds.w * 100;
            
            if (newW < minSize || newH < minSize || newW > maxSize || newH > maxSize) return;
            
            const ratioX = (mousePos.x - state.viewBox.x) / state.viewBox.w;
            const ratioY = (mousePos.y - state.viewBox.y) / state.viewBox.h;
            
            state.viewBox.x = mousePos.x - newW * ratioX;
            state.viewBox.y = mousePos.y - newH * ratioY;
            state.viewBox.w = newW;
            state.viewBox.h = newH;
            
            updateViewBox();
        }, { passive: false });

        function handleSelection(element) {
            clearSelection();
            
            let target = element;
            while (target && target !== layersGroup && 
                   target.tagName !== 'g' && 
                   !target.getAttribute('class')?.includes('svg-layer-g')) {
                if (target.tagName?.match(/^(path|rect|circle|ellipse|line|polyline|polygon|text|g)$/i)) {
                    break;
                }
                target = target.parentElement;
            }
            
            if (!target || target === layersGroup) return;
            
            state.selectedElement = target;
            target.style.filter = 'drop-shadow(0 0 3px #0078d7)';
            
            const bbox = target.getBBox();
            
            const info = {
                type: target.tagName,
                x: bbox.x,
                y: bbox.y,
                width: bbox.width,
                height: bbox.height,
                centerX: bbox.x + bbox.width / 2,
                centerY: bbox.y + bbox.height / 2
            };
            
            sendToCSharp({ type: 'elementSelected', element: info });
        }

        function clearSelection() {
            if (state.selectedElement) {
                state.selectedElement.style.filter = '';
                state.selectedElement = null;
            }
            sendToCSharp({ type: 'selectionCleared' });
        }

        function saveOriginalStyles(g) {
            const originalStyles = [];
            const strokeTags = ['path', 'line', 'polyline', 'polygon', 'rect', 'circle', 'ellipse'];
            const textTags = ['text', 'tspan'];

            g.querySelectorAll('*').forEach(el => {
                const tag = el.tagName.toLowerCase();
                const styleInfo = { element: el };
                
                if (strokeTags.includes(tag)) {
                    styleInfo.strokeWidth = el.getAttribute('stroke-width');
                    styleInfo.vectorEffect = el.style.vectorEffect;
                    styleInfo.stroke = el.getAttribute('stroke');
                }
                if (textTags.includes(tag)) {
                    styleInfo.fontSize = el.getAttribute('font-size');
                }
                if (tag === 'g') {
                    styleInfo.gFontSize = el.getAttribute('font-size');
                    styleInfo.gStyleFontSize = el.style.fontSize;
                }
                
                if (Object.keys(styleInfo).length > 1) {
                    originalStyles.push(styleInfo);
                }
            });
            
            return originalStyles;
        }

        function restoreOriginalStyles(originalStyles) {
            originalStyles.forEach(info => {
                const el = info.element;
                if ('strokeWidth' in info) {
                    if (info.strokeWidth !== null) {
                        el.setAttribute('stroke-width', info.strokeWidth);
                    } else {
                        el.removeAttribute('stroke-width');
                    }
                }
                if ('vectorEffect' in info) {
                    el.style.vectorEffect = info.vectorEffect || '';
                }
                if ('stroke' in info && info.stroke === null) {
                    el.removeAttribute('stroke');
                }
                if ('fontSize' in info) {
                    if (info.fontSize !== null) {
                        el.setAttribute('font-size', info.fontSize);
                    } else {
                        el.removeAttribute('font-size');
                    }
                }
                if ('gFontSize' in info) {
                    if (info.gFontSize !== null) {
                        el.setAttribute('font-size', info.gFontSize);
                    } else {
                        el.removeAttribute('font-size');
                    }
                    el.style.fontSize = info.gStyleFontSize || '';
                }
            });
        }

        function applyStyleConfig(g, originalStyles) {
            if (!state.styleConfig.enableOverride) return;
            const cfg = state.styleConfig;
            const strokeTags = ['path', 'line', 'polyline', 'polygon', 'rect', 'circle', 'ellipse'];
            const textTags = ['text', 'tspan'];
            
            const zoomFactor = getCurrentScale() / getBaseScale();
            const fontScale = cfg.fontScale;

            g.querySelectorAll('*').forEach(el => {
                const tag = el.tagName.toLowerCase();
                if (strokeTags.includes(tag)) {
                    el.setAttribute('stroke-width', cfg.strokeWidth);
                    el.style.vectorEffect = 'non-scaling-stroke';
                    if (!el.getAttribute('stroke') && !el.getAttribute('style')?.includes('stroke')) {
                        el.setAttribute('stroke', '#000');
                    }
                }
                if (textTags.includes(tag)) {
                    const originalStyle = originalStyles?.find(info => info.element === el);
                    const baseFontSize = originalStyle && originalStyle.fontSize 
                        ? parseFloat(originalStyle.fontSize) 
                        : parseFloat(el.getAttribute('font-size')) || 12;
                    let adjustedFontSize = baseFontSize * fontScale / zoomFactor;
                    adjustedFontSize = Math.max(5, Math.min(1000, adjustedFontSize));
                    el.setAttribute('font-size', adjustedFontSize);
                }
                if (tag === 'g') {
                    el.removeAttribute('font-size');
                    el.style.fontSize = '';
                }
            });
        }

        function reapplyStyleToAll() {
            if (state.styleConfig.enableOverride) {
                state.layerOrder.forEach(id => {
                    const layer = state.svgLayers[id];
                    if (layer) {
                        applyStyleConfig(layer.element, layer.originalStyles);
                    }
                });
            } else {
                state.layerOrder.forEach(id => {
                    const layer = state.svgLayers[id];
                    if (layer && layer.originalStyles) {
                        restoreOriginalStyles(layer.originalStyles);
                    }
                });
            }
        }

        function addSvgLayer(id, svgContent, fileName) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = svgContent;
            const svgElem = tempDiv.querySelector('svg');

            if (!svgElem) return;

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'svg-layer-g');
            g.setAttribute('id', `layer-${id}`);
            g.setAttribute('data-file-name', fileName);

            while (svgElem.firstChild) {
                g.appendChild(svgElem.firstChild);
            }

            const originalStyles = saveOriginalStyles(g);

            applyStyleConfig(g, originalStyles);

            layersGroup.appendChild(g);
            state.svgLayers[id] = { element: g, fileName, visible: true, originalStyles };
            state.layerOrder.push(id);

            recalculateAllBounds();

            sendToCSharp({ type: 'layerAdded', id, fileName });
        }

        function createNewSvg(fileName) {
            const svgContent = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"></svg>';
            const id = Date.now().toString();
            addSvgLayer(id, svgContent, fileName || 'new.svg');
        }

        function importJsonToSvg(jsonData, fileName) {
            try {
                const data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
                let svgContent = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">';
                
                if (data.elements && Array.isArray(data.elements)) {
                    data.elements.forEach(el => {
                        if (el.type === 'circle') {
                            svgContent += `<circle cx="${el.cx || 100}" cy="${el.cy || 100}" r="${el.r || 50}" fill="${el.fill || 'blue'}" stroke="${el.stroke || 'black'}" stroke-width="${el.strokeWidth || 1}"/>`;
                        } else if (el.type === 'rect') {
                            svgContent += `<rect x="${el.x || 50}" y="${el.y || 50}" width="${el.width || 100}" height="${el.height || 80}" fill="${el.fill || 'green'}" stroke="${el.stroke || 'black'}" stroke-width="${el.strokeWidth || 1}"/>`;
                        } else if (el.type === 'line') {
                            svgContent += `<line x1="${el.x1 || 50}" y1="${el.y1 || 50}" x2="${el.x2 || 150}" y2="${el.y2 || 100}" stroke="${el.stroke || 'red'}" stroke-width="${el.strokeWidth || 2}"/>`;
                        } else if (el.type === 'text') {
                            svgContent += `<text x="${el.x || 100}" y="${el.y || 100}" font-size="${el.fontSize || 12}" fill="${el.fill || 'black'}">${el.text || 'Text'}</text>`;
                        } else if (el.type === 'path') {
                            svgContent += `<path d="${el.d || ''}" fill="${el.fill || 'none'}" stroke="${el.stroke || 'black'}" stroke-width="${el.strokeWidth || 1}"/>`;
                        } else if (el.type === 'polyline') {
                            svgContent += `<polyline points="${el.points || ''}" fill="${el.fill || 'none'}" stroke="${el.stroke || 'black'}" stroke-width="${el.strokeWidth || 1}"/>`;
                        } else if (el.type === 'polygon') {
                            svgContent += `<polygon points="${el.points || ''}" fill="${el.fill || 'blue'}" stroke="${el.stroke || 'black'}" stroke-width="${el.strokeWidth || 1}"/>`;
                        }
                    });
                }
                
                svgContent += '</svg>';
                
                const id = Date.now().toString();
                addSvgLayer(id, svgContent, fileName || 'imported.json');
                
            } catch (error) {
                console.error('Failed to import JSON:', error);
            }
        }

        function recalculateAllBounds() {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            let hasBounds = false;
            
            state.layerOrder.forEach(id => {
                const layer = state.svgLayers[id];
                if (!layer || !layer.visible) return;
                
                try {
                    const bbox = layer.element.getBBox();
                    if (bbox.width > 0 && bbox.height > 0) {
                        minX = Math.min(minX, bbox.x);
                        minY = Math.min(minY, bbox.y);
                        maxX = Math.max(maxX, bbox.x + bbox.width);
                        maxY = Math.max(maxY, bbox.y + bbox.height);
                        hasBounds = true;
                    }
                } catch(e) {}
            });
            
            if (hasBounds) {
                const padding = 0.1;
                const w = maxX - minX;
                const h = maxY - minY;
                
                state.allLayersBounds = {
                    x: minX - w * padding,
                    y: minY - h * padding,
                    w: w * (1 + 2 * padding),
                    h: h * (1 + 2 * padding)
                };
                
                state.svgBounds = { ...state.allLayersBounds };
            }
        }

        function setLayerVisible(id, visible) {
            const layer = state.svgLayers[id];
            if (layer) {
                layer.visible = visible;
                layer.element.style.display = visible ? 'block' : 'none';
                recalculateAllBounds();
            }
        }

        function removeSvgLayer(id) {
            const layer = state.svgLayers[id];
            if (layer) {
                layer.element.remove();
                delete state.svgLayers[id];
                state.layerOrder = state.layerOrder.filter(lid => lid !== id);
                recalculateAllBounds();
            }
        }

        function resetView() {
            if (state.allLayersBounds) {
                state.viewBox = { ...state.allLayersBounds };
                state.baseViewBox = { ...state.allLayersBounds };
            } else {
                state.viewBox = { x: 0, y: 0, w: 800, h: 600 };
                state.baseViewBox = { x: 0, y: 0, w: 800, h: 600 };
            }
            updateViewBox();
        }

        function setScale(scale) {
            const baseW = state.baseViewBox.w;
            const baseH = state.baseViewBox.h;
            state.viewBox.w = baseW / scale;
            state.viewBox.h = baseH / scale;
            updateViewBox();
        }

        function clearAll() {
            Object.keys(state.svgLayers).forEach(id => {
                state.svgLayers[id].element.remove();
            });
            state.svgLayers = {};
            state.layerOrder = [];
            state.allLayersBounds = null;
            state.svgBounds = { x: 0, y: 0, w: 800, h: 600 };
            clearSelection();
            resetView();
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        function sendToCSharp(message) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(message);
            }
        }

        window.addEventListener('resize', () => {
            updateViewBox();
        });

        window.chrome?.webview?.addEventListener('message', (event) => {
            const msg = event.data;
            if (!msg || !msg.action) return;
            
            switch (msg.action) {
                case 'addSvg':
                    addSvgLayer(msg.id, msg.svgContent, msg.fileName);
                    resetView();
                    break;
                case 'removeSvg':
                    removeSvgLayer(msg.id);
                    break;
                case 'setLayerVisible':
                    setLayerVisible(msg.id, msg.visible);
                    break;
                case 'resetView':
                    resetView();
                    break;
                case 'setScale':
                    setScale(msg.scale);
                    break;
                case 'clearAll':
                    clearAll();
                    break;
                case 'setStyleConfig':
                    state.styleConfig.enableOverride = msg.enableOverride;
                    state.styleConfig.strokeWidth = msg.strokeWidth;
                    state.styleConfig.fontScale = msg.fontScale ?? msg.fontSize ?? 1;
                    if (msg.reapply) {
                        reapplyStyleToAll();
                    }
                    break;
                case 'createNewSvg':
                    createNewSvg(msg.fileName);
                    break;
                case 'importJsonToSvg':
                    importJsonToSvg(msg.jsonData, msg.fileName);
                    break;
            }
        });
    </script>
</body>
</html>
